<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CashPro Görev Platformu</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            background: #f8faf4;
            min-height: 100vh;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #1e2f2a;
            color: white;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar.hidden-sidebar {
            display: none;
        }

        .sidebar-header {
            padding: 28px 20px 20px;
            border-bottom: 1px solid #3a5a50;
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            color: #f9b23f;
            font-size: 24px;
        }

        .sidebar-menu {
            flex: 1;
            padding: 0 16px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            color: #e2f0ea;
        }

        .menu-item.active {
            background: #f9b23f;
            color: #1e2f2a;
            font-weight: bold;
        }
        .menu-item:not(.active):hover { background: #2e4940; }

        .logout-side {
            margin: 20px 16px 30px;
            background: #c13b3b;
            border: none;
            color: white;
            border-radius: 40px;
            padding: 12px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
        }

        .main-content {
            flex: 1;
            padding: 20px 24px;
            max-width: calc(100% - 280px);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-content.full-width {
            max-width: 100%;
        }

        @media (max-width: 780px) {
            .app-layout { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; padding: 12px; align-items: center; justify-content: space-between; }
            .sidebar-header { display: none; }
            .sidebar-menu { display: flex; flex-wrap: wrap; gap: 6px; padding: 0; margin: 0; }
            .menu-item { padding: 8px 16px; margin: 0; background: #2e4940; border-radius: 40px; }
            .logout-side { margin: 0; padding: 8px 20px; width: auto; }
            .main-content { max-width: 100%; padding: 16px; }
        }

        .card {
            background: #1e2f2a;
            border-radius: 32px;
            padding: 20px 18px;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
        }

        .live-feed {
            background: #ffffff;
            border-radius: 32px;
            padding: 18px 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #e9ecef;
            width: 100%;
        }

        .feed-title {
            text-align: center;
            color: #f9b23f;
            margin-bottom: 12px;
            font-size: 1.3rem;
            font-weight: 600;
            border-bottom: 2px solid #f9b23f;
            display: inline-block;
            width: 100%;
        }

        .feed-list {
            height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            padding-right: 4px;
        }

        .feed-item {
            background: #fef7e8;
            margin: 6px 0;
            padding: 10px 14px;
            border-radius: 24px;
            font-size: 0.85rem;
            animation: slideUp 0.25s ease;
            border-left: 5px solid #f9b23f;
            color: #1f2a24;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feed-withdraw { border-left-color: #ff6b6b; background: #fff3f0; }
        .feed-join { border-left-color: #2b7a4b; background: #e9f7ef; }
        .feed-vip { border-left-color: #e6b422; background: #fff9e6; }

        .balance {
            font-size: 2.2rem;
            font-weight: 800;
            color: #f9b23f;
            text-align: center;
            background: #00000030;
            border-radius: 60px;
            padding: 12px 0;
            margin: 10px 0;
        }

        .info-box {
            background: #2e4940cc;
            border-radius: 24px;
            padding: 14px;
            margin: 12px 0;
            font-size: 0.9rem;
        }

        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            border-bottom: 1px solid #3b5b52;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .tab-menu button {
            background: #2e4940;
            color: #e2f0ea;
            margin: 0;
            width: auto;
            padding: 10px 18px;
            font-size: 0.85rem;
            border-radius: 40px;
            flex: 1;
            text-align: center;
            cursor: pointer;
        }

        .tab-menu button.active {
            background: #f9b23f;
            color: #1e2f2a;
            font-weight: bold;
        }

        .hidden { display: none; }

        .welcome-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logout-small {
            background: #c13b3b;
            padding: 8px 20px;
            width: auto;
            font-size: 0.85rem;
            border-radius: 40px;
            cursor: pointer;
        }

        .stats-container {
            background: #f2f6f0;
            border-radius: 28px;
            padding: 16px 8px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat-card {
            text-align: center;
            flex: 1;
            min-width: 100px;
            background: white;
            border-radius: 28px;
            padding: 10px 6px;
        }

        .stat-number { font-size: 1.7rem; font-weight: 800; color: #f9b23f; }
        .stat-label { font-size: 0.75rem; color: #3d554b; font-weight: 500; }

        .loading { text-align: center; padding: 40px; color: #f9b23f; font-weight: bold; }

        .temu-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 20px 0;
        }
        .temu-stat-item {
            background: #f8faf8;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            border: 1px solid #e2e8e0;
        }
        .temu-stat-label { font-size: 12px; color: #5f7a6e; margin-bottom: 6px; }
        .temu-stat-value { font-size: 20px; font-weight: 800; color: #1e2f2a; }

        /* VIP YÜKSELTME ALANI */
        .vip-upgrade-section {
            background: #fefaf2;
            border-radius: 28px;
            padding: 20px;
            margin-top: 20px;
        }
        .vip-levels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .vip-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 2px solid #e2e8e0;
            transition: 0.2s;
            cursor: pointer;
        }
        .vip-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .vip-card.current-vip {
            border-color: #f9b23f;
            background: #fff9e6;
            box-shadow: 0 4px 15px rgba(249, 178, 63, 0.2);
        }
        .vip-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .vip-card h3 {
            font-size: 28px;
            color: #f9b23f;
            margin-bottom: 15px;
        }
        .vip-detail {
            margin: 12px 0;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 16px;
        }
        .vip-detail span {
            display: block;
            font-size: 13px;
            color: #475569;
        }
        .vip-detail strong {
            font-size: 18px;
            color: #1e2f2a;
        }
        .upgrade-btn {
            background: #f9b23f;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }
        .upgrade-btn.disabled-btn {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .current-badge {
            display: inline-block;
            background: #059669;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }

        .invite-section {
            background: #eef6f2;
            border-radius: 24px;
            padding: 18px;
            margin-top: 20px;
        }
        .invite-code {
            background: white;
            padding: 12px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin: 12px 0;
            font-family: monospace;
        }

        .carousel-logos {
            background: white;
            border-radius: 28px;
            padding: 12px 8px;
            overflow: hidden;
            white-space: nowrap;
            border: 1px solid #e2e8f0;
        }
        .logo-track {
            display: inline-block;
            animation: scrollLogos 18s linear infinite;
        }
        .logo-track span {
            display: inline-block;
            margin: 0 18px;
            font-weight: 800;
            font-size: 1.1rem;
            color: #1e2f2a;
        }
        @keyframes scrollLogos {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        input, button {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            border-radius: 60px;
            border: none;
            font-size: 1rem;
        }
        input { background: #2e4940; color: white; outline: none; }
        input::placeholder { color: #bcd9cf; }
        button { background: #f9b23f; color: #1e2f2a; font-weight: bold; cursor: pointer; }
        .danger-btn { background: #c13b3b; color: white; }
    </style>
</head>
<body>
<div class="app-layout">
    <div class="sidebar hidden-sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>⚡ T E M U</h2>
            <p>Kazanç Asistanı</p>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" data-tab="home">🏠 Ana Sayfa</div>
            <div class="menu-item" data-tab="deposit">💰 Yatır</div>
            <div class="menu-item" data-tab="withdraw">📤 Çek</div>
            <div class="menu-item" data-tab="vipupgrade">👑 VIP Yükselt</div>
            <div class="menu-item" data-tab="invite">👥 Arkadaş Daveti</div>
        </div>
        <button id="logoutSidebarBtn" class="logout-side">🚪 Çıkış Yap</button>
    </div>

    <div class="main-content full-width" id="mainContent">
        <div class="card" id="app">
            <div class="loading">🔥 Firebase bağlanıyor...</div>
        </div>
        <div class="live-feed">
            <div class="feed-title">📢 CANLI AKIŞ</div>
            <div class="feed-list" id="feedList">
                <div class="feed-item">🌟 Sistem başlatılıyor...</div>
            </div>
        </div>
        <div class="carousel-logos">
            <div class="logo-track">
                <span>📦 TEMU</span> <span>🛍️ AMAZON</span> <span>🎯 WALMART</span> <span>🐟 SHOPEE</span>
                <span>📱 JUMIA</span> <span>🌋 LAVA LAVA</span> <span>🛒 SOUQ</span> <span>🌸 BONNARCHÉ</span>
                <span>📦 TEMU</span> <span>🛍️ AMAZON</span> <span>🎯 WALMART</span> <span>🐟 SHOPEE</span>
                <span>📱 JUMIA</span> <span>🌋 LAVA LAVA</span> <span>🛒 SOUQ</span> <span>🌸 BONNARCHÉ</span>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDJxVfri7sLN_ThRWrnU9Xm0glmfY5zDrw",
        authDomain: "hediye-ee889.firebaseapp.com",
        projectId: "hediye-ee889",
        storageBucket: "hediye-ee889.firebasestorage.app",
        messagingSenderId: "1000489458750",
        appId: "1:1000489458750:web:45a4b313402679d273456f"
    };
    
    const appFirebase = initializeApp(firebaseConfig);
    const db = getDatabase(appFirebase);
    
    // VIP seviye bilgileri - fotoğraftaki gibi
    const VIP_LEVELS = {
        1: { name: "VIP1", icon: "🥉", minBalance: 300, commission: 2.4, orderCount: 10 },
        2: { name: "VIP2", icon: "🥈", minBalance: 500, commission: 2.8, orderCount: 26 },
        3: { name: "VIP3", icon: "🥇", minBalance: 1500, commission: 3.0, orderCount: 45 },
        4: { name: "VIP4", icon: "💎", minBalance: 4000, commission: 3.2, orderCount: 70 },
        5: { name: "VIP5", icon: "👑", minBalance: 12000, commission: 3.4, orderCount: 100 },
        6: { name: "VIP6", icon: "🏆", minBalance: 25000, commission: 3.6, orderCount: 150 }
    };
    
    let currentUser = null;
    let activeTab = "home";
    let currentUserEmail = null;
    
    let feedMessages = [];
    const MAX_FEED = 35;
    
    let activeUsers = 12840;
    let totalMembers = 259800;
    let totalPaid = 187200;
    
    async function loadFeedFromFirebase() {
        try {
            const feedRef = ref(db, 'feed');
            const snapshot = await get(feedRef);
            const messages = [];
            snapshot.forEach(child => {
                messages.push({ id: child.key, ...child.val() });
            });
            messages.sort((a, b) => (b.time || 0) - (a.time || 0));
            feedMessages = messages.slice(0, MAX_FEED);
            renderFeed();
        } catch (error) {
            console.error("Feed yüklenirken hata:", error);
        }
    }
    
    async function addFeedMessage(text, type = "info") {
        let typeClass = "";
        if (type === "withdraw") typeClass = "feed-withdraw";
        else if (type === "join") typeClass = "feed-join";
        else if (type === "vip") typeClass = "feed-vip";
        
        const newMsg = { text, typeClass, time: Date.now(), type };
        try {
            const feedRef = ref(db, 'feed');
            const newRef = push(feedRef, newMsg);
            feedMessages.unshift({ id: newRef.key, ...newMsg });
            if (feedMessages.length > MAX_FEED) {
                const lastMsg = feedMessages.pop();
                if (lastMsg) await remove(ref(db, 'feed/' + lastMsg.id));
            }
            renderFeed();
        } catch (error) {
            console.error("Feed eklenirken hata:", error);
        }
    }
    
    function renderFeed() {
        const feedDiv = document.getElementById("feedList");
        if (!feedDiv) return;
        feedDiv.innerHTML = feedMessages.map(msg => `<div class="feed-item ${msg.typeClass}">${escapeHtml(msg.text)}</div>`).join("");
        if (feedMessages.length === 0) feedDiv.innerHTML = '<div class="feed-item">🌟 Sistem hazır...</div>';
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function randomWithdrawSimulation() {
        const randomAmount = Math.floor(Math.random() * 12000) + 70;
        const randomPhone = "+90 " + Math.floor(Math.random() * 9000000000 + 1000000000).toString().slice(0, 3) + "****" + Math.floor(Math.random() * 90 + 10).toString();
        addFeedMessage(`📤 ${randomPhone} ${randomAmount.toLocaleString()} TL başarıyla çekti`, "withdraw");
        totalPaid += randomAmount;
    }
    
    function randomJoinSimulation() {
        const randomPhone = "+90 " + Math.floor(Math.random() * 9000000000 + 1000000000).toString().slice(0, 3) + "****" + Math.floor(Math.random() * 90 + 10).toString();
        addFeedMessage(`✨ Yeni üye: ${randomPhone} sisteme katıldı!`, "join");
        totalMembers += 1;
        activeUsers += Math.floor(Math.random() * 6) + 2;
    }
    
    function randomVipSimulation() {
        const vipLevel = Math.floor(Math.random() * 5) + 1;
        addFeedMessage(`👑 +90 5****** VIP ${vipLevel} seviyesine yükseldi!`, "vip");
    }
    
    function updateActiveUsers() {
        activeUsers = Math.floor(Math.random() * 2800) + 12500;
    }
    
    function updateStatsUI() {
        const statsDiv = document.getElementById("statsContainer");
        if (statsDiv && activeTab === "home") {
            statsDiv.innerHTML = `
                <div class="stat-card"><div class="stat-number">👥 ${activeUsers.toLocaleString()}</div><div class="stat-label">Aktif Kullanıcı</div></div>
                <div class="stat-card"><div class="stat-number">📊 ${totalMembers.toLocaleString()}</div><div class="stat-label">Toplam Üye</div></div>
                <div class="stat-card"><div class="stat-number">💰 ${totalPaid.toLocaleString()} TL</div><div class="stat-label">Toplam Ödeme</div></div>
            `;
        }
    }
    
    function encodeEmail(email) { return email.replace(/\./g, ',').replace(/#/g, '_').replace(/\$/g, '_'); }
    
    // HAFTALIK KOMİSYON
    async function applyWeeklyCommission() {
        if (!currentUser) return;
        const userVip = currentUser.vip || 0;
        if (userVip > 0 && VIP_LEVELS[userVip]) {
            const commissionRate = VIP_LEVELS[userVip].commission;
            const balance = currentUser.balance || 0;
            const commissionAmount = (balance * commissionRate) / 100;
            if (commissionAmount > 0) {
                const userRef = ref(db, 'users/' + encodeEmail(currentUser.email));
                const newBalance = balance + commissionAmount;
                const newTodayEarn = (currentUser.todayEarn || 0) + commissionAmount;
                const newTotalEarn = (currentUser.totalEarn || 0) + commissionAmount;
                await update(userRef, { balance: newBalance, todayEarn: newTodayEarn, totalEarn: newTotalEarn });
                await addFeedMessage(`📈 Haftalık komisyon: VIP${userVip} ile +${commissionAmount.toFixed(2)} TL kazandınız!`, "vip");
                if (currentUser) currentUser.balance = newBalance;
            }
        }
    }
    
    // VIP YÜKSELTME - İstediğin seviyeyi seçebilirsin, bakiye yeterliyse direkt o seviyeye geçer
    async function upgradeVIP(targetLevel) {
        if (!currentUser) return { success: false, message: "Oturum hatası" };
        
        const vipInfo = VIP_LEVELS[targetLevel];
        if (!vipInfo) return { success: false, message: "Geçersiz VIP seviyesi" };
        
        const currentBalance = currentUser.balance || 0;
        if (currentBalance < vipInfo.minBalance) {
            return { success: false, message: `Yetersiz bakiye! ${vipInfo.name} için minimum ${vipInfo.minBalance} TL gerekli.` };
        }
        
        const userRef = ref(db, 'users/' + encodeEmail(currentUser.email));
        await update(userRef, { vip: targetLevel });
        
        await addFeedMessage(`🎉 ${currentUser.name} ${vipInfo.name} seviyesine yükseldi! Haftalık komisyon: %${vipInfo.commission}`, "vip");
        
        return { success: true, message: `${vipInfo.name} seviyesine yükseldiniz! Haftalık komisyon oranınız %${vipInfo.commission}` };
    }
    
    async function createDepositRequest(userEmail, fullName, amount) {
        const now = new Date();
        const saat = now.toLocaleTimeString("tr-TR");
        const tarih = now.toLocaleDateString("tr-TR");
        const requestsRef = ref(db, 'deposit_requests');
        await push(requestsRef, { userEmail, fullName, amount, saat, tarih, status: "beklemede", createdAt: Date.now() });
        await addFeedMessage(`💰 ${fullName} ${amount.toLocaleString()} TL yatırma talebi gönderdi`, "info");
        return true;
    }
    
    async function createWithdrawRequest(userEmail, fullName, iban, amount) {
        const userRef = ref(db, 'users/' + encodeEmail(userEmail));
        const userSnap = await get(userRef);
        if (!userSnap.exists()) return "Kullanıcı bulunamadı";
        const user = userSnap.val();
        if (amount <= 0) return "Geçersiz miktar";
        if (amount > (user.balance || 0)) return "Yetersiz bakiye";
        
        const now = new Date();
        const saat = now.toLocaleTimeString("tr-TR");
        const tarih = now.toLocaleDateString("tr-TR");
        const requestsRef = ref(db, 'withdraw_requests');
        await push(requestsRef, { userEmail, fullName, iban, amount, saat, tarih, status: "beklemede", createdAt: Date.now() });
        const transactions = user.transactions || [];
        transactions.unshift({ type: "çekim_talebi", amount, date: `${tarih} ${saat}`, status: "beklemede" });
        await update(userRef, { transactions });
        await addFeedMessage(`📤 ${fullName} ${amount.toLocaleString()} TL çekim talebi oluşturdu`, "withdraw");
        return "Çekim talebi alındı, admin onaylayacak";
    }
    
    // PROMOSYON KODU
    function generatePromoCode(email, name) {
        let code = (name.slice(0,3) + email.slice(0,5)).toUpperCase().replace(/[^A-Z0-9]/g, '');
        if(code.length < 6) code = code + Math.floor(Math.random()*9000+1000);
        return code.slice(0,10);
    }
    
    async function applyReferralBonus(newUserEmail, referrerCode, adminBonusAmount = 50) {
        if(!referrerCode) return false;
        const usersRef = ref(db, 'users');
        const snapshot = await get(usersRef);
        let referrerEmail = null;
        snapshot.forEach(child => {
            const u = child.val();
            if(u.promoCode === referrerCode && u.email !== newUserEmail) {
                referrerEmail = u.email;
            }
        });
        if(referrerEmail) {
            const referrerRef = ref(db, 'users/' + encodeEmail(referrerEmail));
            const referrerSnap = await get(referrerRef);
            if(referrerSnap.exists()) {
                let refUser = referrerSnap.val();
                let newBalance = (refUser.balance || 0) + adminBonusAmount;
                let newTeamBonus = (refUser.teamBonus || 0) + adminBonusAmount;
                await update(referrerRef, { balance: newBalance, teamBonus: newTeamBonus });
                await addFeedMessage(`🎁 Davet bonusu: ${refUser.name} ${adminBonusAmount} TL kazandı!`, "join");
                return true;
            }
        }
        return false;
    }
    
    // RENDER FONKSİYONLARI
    function renderHomeTab(user) {
        setTimeout(() => updateStatsUI(), 10);
        const currentVipInfo = user.vip && VIP_LEVELS[user.vip] ? VIP_LEVELS[user.vip] : null;
        return `
            <div class="welcome-header">
                <h2>👋 Hoşgeldin, ${user.name}</h2>
                <button id="logoutBtn" class="logout-small danger-btn">Çıkış</button>
            </div>
            <div class="balance">💰 ${(user.balance || 0).toLocaleString()} TL</div>
            <div class="info-box">⭐ VIP ${user.vip || '0'} — ${currentVipInfo ? `Haftalık komisyon: %${currentVipInfo.commission}` : "VIP yükselterek haftalık komisyon kazanın"}</div>
            
            <div class="temu-stats-grid">
                <div class="temu-stat-item"><div class="temu-stat-label">👤 Kullanıcı adı</div><div class="temu-stat-value">${user.name || user.email.split('@')[0]}</div></div>
                <div class="temu-stat-item"><div class="temu-stat-label">🎟️ Promosyon kodu</div><div class="temu-stat-value">${user.promoCode || "---"}</div></div>
                <div class="temu-stat-item"><div class="temu-stat-label">💰 Hesap bakiyesi</div><div class="temu-stat-value">₺${(user.balance || 0).toLocaleString()}</div></div>
                <div class="temu-stat-item"><div class="temu-stat-label">🎯 Misyon fonları</div><div class="temu-stat-value">₺${(user.totalInvested || 0).toLocaleString()}</div></div>
                <div class="temu-stat-item"><div class="temu-stat-label">📈 Bugünkü kazanç</div><div class="temu-stat-value">₺${(user.todayEarn || 0).toLocaleString()}</div></div>
                <div class="temu-stat-item"><div class="temu-stat-label">📆 Dünkü kazanç</div><div class="temu-stat-value">₺${(user.yesterdayEarn || 0).toLocaleString()}</div></div>
                <div class="temu-stat-item"><div class="temu-stat-label">📊 Kümülatif gelir</div><div class="temu-stat-value">₺${(user.totalEarn || 0).toLocaleString()}</div></div>
                <div class="temu-stat-item"><div class="temu-stat-label">👥 Takım faydaları</div><div class="temu-stat-value">₺${(user.teamBonus || 0).toLocaleString()}</div></div>
            </div>
            
            <div class="home-stats"><div class="stats-container" id="statsContainer"></div></div>
            <div class="info-box" style="text-align:center; background:#2e4940;">📡 Canlı akış! VIP yükselterek haftalık komisyon kazanın. Komisyonlar her Pazar eklenir.</div>
        `;
    }
    
    function renderVIPUpgradeTab(user) {
        let vipCardsHtml = '<div class="vip-levels-grid">';
        
        for (let i = 1; i <= 6; i++) {
            const vip = VIP_LEVELS[i];
            const isCurrent = user.vip === i;
            const hasEnoughBalance = (user.balance || 0) >= vip.minBalance;
            
            vipCardsHtml += `
                <div class="vip-card ${isCurrent ? 'current-vip' : ''}" onclick="document.querySelector('.upgrade-btn-${i}')?.click()">
                    <div class="vip-icon">${vip.icon}</div>
                    <h3>${vip.name}</h3>
                    <div class="vip-detail">
                        <span>Minimum bakiye</span>
                        <strong>₺${vip.minBalance.toLocaleString()}</strong>
                    </div>
                    <div class="vip-detail">
                        <span>Komisyon oranı</span>
                        <strong>${vip.commission}%</strong>
                    </div>
                    <div class="vip-detail">
                        <span>Sipariş Miktarı</span>
                        <strong>${vip.orderCount}</strong>
                    </div>
                    ${isCurrent ? '<div class="current-badge">✅ Mevcut Seviyeniz</div>' : ''}
                    <button class="upgrade-btn upgrade-btn-${i}" data-level="${i}" ${!hasEnoughBalance ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>
                        ${isCurrent ? 'Mevcut Seviye' : (hasEnoughBalance ? '👑 Hemen Yükselt' : '🔒 Yetersiz Bakiye')}
                    </button>
                </div>
            `;
        }
        vipCardsHtml += '</div>';
        
        return `
            <div class="welcome-header">
                <h2>👑 VIP Yükseltme</h2>
                <button id="logoutBtn" class="logout-small danger-btn">Çıkış</button>
            </div>
            <div class="balance">💰 ${(user.balance || 0).toLocaleString()} TL</div>
            <div class="info-box">⭐ Mevcut VIP Seviyeniz: <strong>VIP${user.vip || 0}</strong> ${user.vip > 0 ? `(${VIP_LEVELS[user.vip]?.icon} Komisyon: %${VIP_LEVELS[user.vip]?.commission || 0})` : ""}</div>
            <div class="vip-upgrade-section">
                <h3 style="margin-bottom:10px;">📊 VIP Seviyeleri</h3>
                ${vipCardsHtml}
                <div class="info-box" style="margin-top:20px; background:#2e4940;">
                    💡 <strong>Nasıl çalışır?</strong><br>
                    • İstediğin VIP seviyesini seçebilirsin, yeterli bakiyen varsa direkt o seviyeye yükselirsin.<br>
                    • Örnek: VIP5 olmak için 12.000 TL bakiyen olması yeterli.<br>
                    • Her VIP seviyesi haftalık komisyon oranını artırır.<br>
                    • Komisyonlar her Pazar günü otomatik bakiyene eklenir.
                </div>
            </div>
        `;
    }
    
    function renderDepositTab(user) {
        return `
            <div class="welcome-header"><h2>💰 Para Yatırma Talebi</h2><button id="logoutBtn" class="logout-small danger-btn">Çıkış</button></div>
            <div class="balance">💰 ${(user.balance || 0).toLocaleString()} TL</div>
            <div class="info-box">⭐ VIP ${user.vip || '0'} | Yatırım yaparak VIP seviye atlayın.</div>
            <div class="info-box">🏦 Havale IBAN: <strong>TR73 0082 9000 0949 1370 0989 09</strong><br><small>Bu IBAN'a yatırım yapıp formu doldurun.</small></div>
            <hr>
            <h3>📝 Yatırım Talebi Formu</h3>
            <input type="text" id="fullName" placeholder="Ad Soyad" value="${user.name}">
            <input type="number" id="depositAmount" placeholder="Yatırılan Tutar (TL)">
            <button id="sendDepositBtn">✅ Onayla ve Gönder</button>
            <div class="info-box" style="margin-top:16px;">⚠️ Talep oluşturduktan sonra admin onayı bekleyin. Onaylandığında bakiyenize yansıyacaktır.</div>
        `;
    }
    
    function renderWithdrawTab(user) {
        const txs = user.transactions || [];
        const txHtml = txs.length ? txs.slice(0,10).map(t => `<div class="info-box">💸 ${t.type}: ${t.amount?.toLocaleString()} TL (${t.date}) ${t.status ? '🔔 '+t.status : ''}</div>`).join("") : "<div class='info-box'>📭 Henüz işlem yok</div>";
        return `
            <div class="welcome-header"><h2>📤 Para Çekme Talebi</h2><button id="logoutBtn" class="logout-small danger-btn">Çıkış</button></div>
            <div class="balance">💰 ${(user.balance || 0).toLocaleString()} TL</div>
            <div class="info-box">⭐ VIP ${user.vip || '0'}</div>
            <hr>
            <input type="text" id="withdrawFullName" placeholder="Ad Soyad" value="${user.name}">
            <input type="text" id="iban" placeholder="IBAN (TR ile başlayan)">
            <input type="number" id="withdrawAmount" placeholder="Çekilecek Tutar (TL)">
            <button id="sendWithdrawBtn">📤 Talep Gönder</button>
            <h3>📜 Son İşlemlerim</h3>
            <div id="txList" style="max-height:200px; overflow:auto;">${txHtml}</div>
        `;
    }
    
    function renderInviteTab(user) {
        return `
            <div class="welcome-header"><h2>👥 Arkadaş Davet Sistemi</h2><button id="logoutBtn" class="logout-small danger-btn">Çıkış</button></div>
            <div class="invite-section">
                <div>🔑 <strong>Senin özel promosyon kodun:</strong></div>
                <div class="invite-code" style="font-size:24px; letter-spacing:2px;">${user.promoCode || "HATA"}</div>
                <div>💡 Bu kod SADECE SANA ÖZEL! Arkadaşlarına gönder, kayıt olurken bu kodu girsinler.</div>
                <div style="margin:15px 0; padding:12px; background:#fef3c7; border-radius:16px;">
                    🎁 <strong>Nasıl çalışır?</strong><br>
                    Arkadaşın kayıt olurken senin promosyon kodunu girerse, hem sen hem arkadaşın <strong>₺50 bonus</strong> kazanır!
                </div>
                <button id="copyInviteCode" style="background:#1e2f2a; color:white; border:none; padding:12px; border-radius:30px;">📋 Kodu Kopyala</button>
                <div class="info-box" style="margin-top:14px;">⭐ Bonus sadece yeni kayıtlarda geçerlidir. Her arkadaş davetinde ₺50 kazanırsın!</div>
            </div>
        `;
    }
    
    async function renderLoginScreen() {
        const app = document.getElementById("app");
        app.innerHTML = `
            <h1>💎 KAZANÇ SİMÜLASYONU</h1>
            <div class="tab-menu"><button id="loginTab" class="active">Giriş</button><button id="registerTab">Kayıt</button></div>
            <div id="loginPanel"><input type="email" id="loginEmail" placeholder="E-posta"><input type="password" id="loginPass" placeholder="Şifre"><button id="doLogin">Giriş</button></div>
            <div id="registerPanel" class="hidden">
                <input type="text" id="regName" placeholder="Ad Soyad">
                <input type="email" id="regEmail" placeholder="E-posta">
                <input type="tel" id="regPhone" placeholder="Telefon">
                <input type="text" id="regPromo" placeholder="Promosyon kodu (varsa)">
                <input type="password" id="regPass" placeholder="Şifre">
                <button id="doReg">Kayıt Ol</button>
                <div class="info-box" style="margin-top:12px;">⭐ Arkadaşının promosyon kodu varsa buraya yaz, ikiniz de 50 TL bonus kazanın!</div>
            </div>
        `;
        
        document.getElementById("loginTab").onclick = () => { 
            document.getElementById("loginPanel").classList.remove("hidden"); 
            document.getElementById("registerPanel").classList.add("hidden"); 
            document.getElementById("loginTab").classList.add("active"); 
            document.getElementById("registerTab").classList.remove("active"); 
        };
        document.getElementById("registerTab").onclick = () => { 
            document.getElementById("loginPanel").classList.add("hidden"); 
            document.getElementById("registerPanel").classList.remove("hidden"); 
            document.getElementById("registerTab").classList.add("active"); 
            document.getElementById("loginTab").classList.remove("active"); 
        };
        
        document.getElementById("doLogin").onclick = async () => {
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPass").value;
            const userRef = ref(db, 'users/' + encodeEmail(email));
            const userSnap = await get(userRef);
            if (userSnap.exists() && userSnap.val().password === password) {
                currentUserEmail = email;
                currentUser = userSnap.val();
                currentUser.email = email;
                onValue(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        currentUser = snapshot.val();
                        currentUser.email = email;
                        render();
                    }
                });
                render();
            } else {
                alert("Hatalı e-posta veya şifre");
            }
        };
        
        document.getElementById("doReg").onclick = async () => {
            const name = document.getElementById("regName").value;
            const email = document.getElementById("regEmail").value;
            const phone = document.getElementById("regPhone").value;
            const promoCodeInput = document.getElementById("regPromo").value;
            const password = document.getElementById("regPass").value;
            
            if (!name || !email || !phone || !password) {
                alert("Tüm alanlar gerekli");
                return;
            }
            
            const userRef = ref(db, 'users/' + encodeEmail(email));
            const userSnap = await get(userRef);
            if (userSnap.exists()) {
                alert("Bu e-posta zaten kayıtlı");
                return;
            }
            
            const promoCode = generatePromoCode(email, name);
            const newUser = {
                name: name,
                email: email,
                phone: phone,
                password: password,
                balance: 0,
                totalInvested: 0,
                vip: 0,
                transactions: [],
                createdAt: Date.now(),
                promoCode: promoCode,
                todayEarn: 0,
                yesterdayEarn: 0,
                totalEarn: 0,
                teamBonus: 0
            };
            await set(userRef, newUser);
            
            let bonusGiven = false;
            if (promoCodeInput && promoCodeInput.trim() !== "") {
                bonusGiven = await applyReferralBonus(email, promoCodeInput.trim(), 50);
                if (bonusGiven) {
                    await addFeedMessage(`🎉 Yeni üye ${name} davet kodu ile katıldı!`, "join");
                    const newUserRef = ref(db, 'users/' + encodeEmail(email));
                    const newUserSnap = await get(newUserRef);
                    if(newUserSnap.exists()) {
                        let u = newUserSnap.val();
                        await update(newUserRef, { balance: (u.balance||0) + 50, teamBonus: (u.teamBonus||0) + 50, todayEarn: (u.todayEarn||0) + 50 });
                    }
                } else {
                    await addFeedMessage(`✨ ${name} sisteme katıldı!`, "join");
                }
            } else {
                await addFeedMessage(`✨ ${name} sisteme katıldı!`, "join");
            }
            
            totalMembers++;
            alert("Kayıt başarılı! " + (bonusGiven ? "50 TL bonus kazandınız! " : "") + "Şimdi giriş yapabilirsiniz.");
        };
    }
    
    function toggleSidebar(show) {
        const sidebar = document.getElementById("sidebar");
        const mainContent = document.getElementById("mainContent");
        if (show) {
            sidebar.classList.remove("hidden-sidebar");
            mainContent.classList.remove("full-width");
        } else {
            sidebar.classList.add("hidden-sidebar");
            mainContent.classList.add("full-width");
        }
    }
    
    async function render() {
        const app = document.getElementById("app");
        
        if (!currentUser) {
            toggleSidebar(false);
            await renderLoginScreen();
            return;
        }
        
        toggleSidebar(true);
        
        let content = "";
        if (activeTab === "home") content = renderHomeTab(currentUser);
        else if (activeTab === "deposit") content = renderDepositTab(currentUser);
        else if (activeTab === "withdraw") content = renderWithdrawTab(currentUser);
        else if (activeTab === "vipupgrade") content = renderVIPUpgradeTab(currentUser);
        else if (activeTab === "invite") content = renderInviteTab(currentUser);
        
        app.innerHTML = content;
        
        const logoutBtn = document.getElementById("logoutBtn");
        if (logoutBtn) logoutBtn.onclick = () => { currentUser = null; render(); };
        
        const sendDepositBtn = document.getElementById("sendDepositBtn");
        if (sendDepositBtn) {
            sendDepositBtn.onclick = async () => {
                let fullName = document.getElementById("fullName")?.value;
                let amount = parseFloat(document.getElementById("depositAmount")?.value);
                if (!fullName || fullName.trim() === "") { alert("Ad soyad girin"); return; }
                if (!amount || amount <= 0) { alert("Geçerli tutar girin"); return; }
                await createDepositRequest(currentUser.email, fullName, amount);
                alert("Talebiniz alındı! Admin onayından sonra bakiyenize yansıyacaktır.");
                document.getElementById("depositAmount").value = "";
            };
        }
        
        const sendWithdrawBtn = document.getElementById("sendWithdrawBtn");
        if (sendWithdrawBtn) {
            sendWithdrawBtn.onclick = async () => {
                let fullName = document.getElementById("withdrawFullName")?.value;
                let iban = document.getElementById("iban")?.value;
                let amount = parseFloat(document.getElementById("withdrawAmount")?.value);
                if (!fullName || fullName.trim() === "") { alert("Ad soyad girin"); return; }
                if (!iban || iban.trim() === "") { alert("IBAN girin"); return; }
                if (!amount || amount <= 0) { alert("Geçerli tutar girin"); return; }
                let msg = await createWithdrawRequest(currentUser.email, fullName, iban, amount);
                alert(msg);
                if (msg.includes("alındı")) {
                    document.getElementById("withdrawAmount").value = "";
                    document.getElementById("iban").value = "";
                }
                render();
            };
        }
        
        const upgradeBtns = document.querySelectorAll(".upgrade-btn");
        upgradeBtns.forEach(btn => {
            if (!btn.disabled) {
                btn.addEventListener("click", async () => {
                    const level = parseInt(btn.dataset.level);
                    const result = await upgradeVIP(level);
                    alert(result.message);
                    if (result.success) {
                        const userRef = ref(db, 'users/' + encodeEmail(currentUser.email));
                        const snap = await get(userRef);
                        if (snap.exists()) {
                            currentUser = snap.val();
                            currentUser.email = currentUserEmail;
                        }
                        render();
                    }
                });
            }
        });
        
        const copyBtn = document.getElementById("copyInviteCode");
        if (copyBtn && currentUser) {
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(currentUser.promoCode);
                alert("Promosyon kodu kopyalandı! Arkadaşlarına gönderebilirsin.");
            };
        }
        
        const txDiv = document.getElementById("txList");
        if (txDiv && currentUser) {
            let txs = currentUser.transactions || [];
            txDiv.innerHTML = txs.length ? txs.slice(0,10).map(t => `<div class="info-box">${t.type}: ${t.amount?.toLocaleString()} TL (${t.date}) ${t.status ? '🔔 '+t.status : ''}</div>`).join("") : "<div class='info-box'>İşlem yok</div>";
        }
        
        if (activeTab === "home") updateStatsUI();
    }
    
    setInterval(() => { updateActiveUsers(); updateStatsUI(); }, 3800);
    setInterval(() => {
        const rand = Math.random();
        if (rand < 0.5) randomWithdrawSimulation();
        else if (rand < 0.75) randomJoinSimulation();
        else randomVipSimulation();
        updateStatsUI();
    }, 4500);
    
    setInterval(async () => {
        const now = new Date();
        if (now.getDay() === 0) {
            const lastCommission = localStorage.getItem("lastCommissionDate");
            const today = now.toDateString();
            if (lastCommission !== today) {
                await applyWeeklyCommission();
                localStorage.setItem("lastCommissionDate", today);
            }
        }
    }, 3600000);
    
    function initSidebar() {
        const items = document.querySelectorAll(".menu-item");
        items.forEach(item => {
            item.addEventListener("click", () => {
                const tab = item.dataset.tab;
                activeTab = tab;
                items.forEach(i => i.classList.remove("active"));
                item.classList.add("active");
                render();
            });
            if (item.dataset.tab === "home") item.classList.add("active");
        });
        
        const logoutSide = document.getElementById("logoutSidebarBtn");
        if (logoutSide) {
            logoutSide.addEventListener("click", () => {
                currentUser = null;
                render();
            });
        }
    }
    
    async function init() {
        await loadFeedFromFirebase();
        initSidebar();
        render();
    }
    
    init();
</script>
</body>
</html>
